services:
  router:
    build:
      context: ./router
      args:
        UBUNTU_IMAGE: ${DOCKER_UBUNTU_IMAGE:-ubuntu:24.04}
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      BACKEND_PROTOCOL: ${BACKEND_PROTOCOL:-http}
      BACKEND_HOST: ${BACKEND_HOST:-backend}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      PUBLIC_PORT: ${PUBLIC_PORT:-80}
    ports:
      - "${DOCKER_PUBLIC_BIND:-127.0.0.1}:${DOCKER_PUBLIC_PORT:-8080}:${PUBLIC_PORT:-80}"
    networks:
      public: {}
      private: {}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      args:
        UBUNTU_IMAGE: ${DOCKER_UBUNTU_IMAGE:-ubuntu:24.04}
    expose:
      - "8080"
    networks:
      private: {}

networks:
  public:
    driver: bridge
  private:
    driver: bridge
    internal: true
